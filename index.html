<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea Vidal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; color: #111; font-family: 'Arial Black', 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 28px 40px; z-index: 10; background: #fff; }
  .nav-logo { font-size: 22px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; color: #111; cursor: pointer; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 36px; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links li a { font-size: 18px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; color: #bbb; text-decoration: none; transition: color 0.2s; cursor: pointer; }
  .nav-links li a:hover, .nav-links li a.active { color: #111; }
  .insta-link { display: flex; align-items: center; opacity: 0.3; transition: opacity 0.2s; text-decoration: none; }
  .insta-link:hover { opacity: 1; }
  .insta-link svg { width: 20px; height: 20px; fill: #111; }
  .hero { flex: 1; position: relative; overflow: hidden; min-height: calc(100vh - 100px); display: none; }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero.active { display: flex; }
  .portfolio-section { display: none; background: #fff; padding: 0 40px 80px; }
  .portfolio-section.active { display: block; }
  .year-group { margin-bottom: 80px; }
  .year-label { font-size: 28px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: #bbb; padding: 40px 0 20px; border-top: 0.5px solid #e5e5e5; }
  .mosaic { display: flex; flex-direction: column; gap: 4px; }
  .row { display: grid; gap: 4px; }
  .r-1     { grid-template-columns: 1fr; }
  .r-2     { grid-template-columns: 1fr 1fr; }
  .r-3     { grid-template-columns: 1fr 1fr 1fr; }
  .r-4     { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .r-h2p   { grid-template-columns: 3fr 2fr; }   /* 1 horizontal + 1 portrait */
  .r-p2h   { grid-template-columns: 2fr 3fr; }   /* 1 portrait + 1 horizontal */
  .r-h1p   { grid-template-columns: 3fr 2fr 2fr; } /* 1 horizontal + 2 portraits */
  .r-p1h   { grid-template-columns: 2fr 2fr 3fr; } /* 2 portraits + 1 horizontal */

  /* h = 3/2 horizontal, p = 2/3 portrait */
  .grid-item { background: #f0f0f0; position: relative; overflow: hidden; cursor: pointer; }
  .grid-item.h { aspect-ratio: 3/2; }
  .grid-item.w { aspect-ratio: 4/3; }
  .grid-item.v { aspect-ratio: 3/4; }
  .grid-item.p { aspect-ratio: 2/3; }

  .grid-overlay { display: none; }
  .grid-placeholder { width: 100%; height: 100%; min-height: 100px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 900; }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; inset: 0; }

  .contact-section { display: none; padding: 80px 40px; background: #fff; flex-direction: column; align-items: flex-start; gap: 32px; }
  .contact-section.active { display: flex; }
  .contact-section h2 { font-size: 32px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: #111; }
  .contact-section p { font-size: 48px; font-weight: 900; color: #111; letter-spacing: 0.02em; line-height: 1.0; text-transform: uppercase; }
  .contact-links { display: flex; flex-direction: column; gap: 14px; margin-top: 12px; }
  .contact-link { font-size: 18px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; color: #bbb; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: color 0.2s; }
  .contact-link:hover { color: #111; }
  .contact-link::before { content: ''; display: inline-block; width: 20px; height: 0.5px; background: currentColor; }
  .contact-copy { font-size: 11px; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase; color: #ccc; margin-top: 40px; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  .lightbox-close { position: absolute; top: 24px; right: 32px; width: 32px; height: 32px; cursor: pointer; opacity: 0.2; transition: opacity 0.2s; }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-close::before, .lightbox-close::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1.5px; background: #111; }
  .lightbox-close::before { transform: rotate(45deg); }
  .lightbox-close::after { transform: rotate(-45deg); }
  .lightbox-placeholder { color: #ccc; font-size: 13px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; text-align: center; }
  .lightbox-arrow { position: fixed; top: 50%; transform: translateY(-50%); width: 60px; height: 60px; cursor: pointer; opacity: 0.2; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; z-index: 1001; }
  .lightbox-arrow:hover { opacity: 1; }
  .lightbox-arrow.prev { left: 24px; }
  .lightbox-arrow.next { right: 24px; }
  .lightbox-arrow svg { width: 28px; height: 28px; fill: none; stroke: #111; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" onclick="showSection('home')">ANDREA VIDAL</a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="#" id="link-portfolio" onclick="showSection('portfolio'); return false;">PORTFOLIO</a></li>
      <li><a href="#" id="link-contact" onclick="showSection('contact'); return false;">CONTACT</a></li>
    </ul>
    <a class="insta-link" href="https://www.instagram.com/andrea.vdl_" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </a>
  </div>
</nav>

<div class="hero active" id="section-home">
  <img src="photos/cover.jpg" alt="Andrea Vidal" />
</div>

<div class="portfolio-section" id="section-portfolio">
  <div class="year-group">
    <div class="year-label">2026</div>
    <div class="mosaic" id="grid-2026"></div>
  </div>
  <div class="year-group">
    <div class="year-label">2025</div>
    <div class="mosaic" id="grid-2025"></div>
  </div>
  <div class="year-group">
    <div class="year-label">2024</div>
    <div class="mosaic" id="grid-2024"></div>

  <div class="contact-links">
    <a class="contact-link" href="https://www.instagram.com/andrea.vdl_" target="_blank">Instagram — @andrea.vdl_</a>
    <a class="contact-link" href="mailto:vidal.andrea85@yahoo.com">Mail — vidal.andrea85@yahoo.com</a>
    <a class="contact-link">Paris, France</a>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')"></div>
  <div class="lightbox-arrow prev" onclick="lightboxNav(-1)">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </div>
  <div id="lightbox-content"></div>
  <div class="lightbox-arrow next" onclick="lightboxNav(1)">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </div>
</div>

<script>
/*
  h = 3/2 horizontal (3/4 des photos)
  p = 2/3 portrait   (1/4 des photos)

  2026 : 15h + 5p  — pattern centré sur les grands horizontaux
  2025 : 15h + 5p  — pattern avec alternances plus rythmées
  2024 : 15h + 5p  — pattern avec rangées larges et portraits isolés
*/

// 2026 — 10h + 2w(4/3 paysage) + 1v(3/4 portrait) + 1p(2/3) — 14 photos
// w = 4/3 paysage (n°1, n°9)
// v = 3/4 portrait (n°5)
// p = 2/3 portrait (n°13)
const LAYOUT_2026 = [
  { cls: 'r-2',   items: [{ n:1,  r:'w' }, { n:2,  r:'h' }] },
  { cls: 'r-2',   items: [{ n:3,  r:'h' }, { n:4,  r:'h' }] },
  { cls: 'r-h2p', items: [{ n:6,  r:'h' }, { n:5,  r:'v' }] },
  { cls: 'r-2',   items: [{ n:7,  r:'h' }, { n:8,  r:'h' }] },
  { cls: 'r-2',   items: [{ n:9,  r:'w' }, { n:10, r:'h' }] },
  { cls: 'r-2',   items: [{ n:11, r:'h' }, { n:12, r:'h' }] },
  { cls: 'r-h2p', items: [{ n:14, r:'h' }, { n:13, r:'p' }] },
];

// 2025 — 16h + 4p — 20 photos (portraits 9+10 côte à côte, 3 et 18 seuls)
const LAYOUT_2025 = [
  { cls: 'r-2',   items: [{ n:1,  r:'h' }, { n:2,  r:'h' }] },
  { cls: 'r-h2p', items: [{ n:4,  r:'h' }, { n:3,  r:'p' }] },
  { cls: 'r-2',   items: [{ n:5,  r:'h' }, { n:6,  r:'h' }] },
  { cls: 'r-2',   items: [{ n:7,  r:'h' }, { n:8,  r:'h' }] },
  { cls: 'r-2',   items: [{ n:9,  r:'p' }, { n:10, r:'p' }] },
  { cls: 'r-2',   items: [{ n:11, r:'h' }, { n:12, r:'h' }] },
  { cls: 'r-2',   items: [{ n:13, r:'h' }, { n:14, r:'h' }] },
  { cls: 'r-2',   items: [{ n:15, r:'h' }, { n:16, r:'h' }] },
  { cls: 'r-p2h', items: [{ n:17, r:'p' }, { n:18, r:'h' }] },
  { cls: 'r-2',   items: [{ n:19, r:'h' }, { n:20, r:'h' }] },
];

// 2024 — 13h + 2p — 15 photos (portraits : 5, 9)
const LAYOUT_2024 = [
  { cls: 'r-2',   items: [{ n:1,  r:'h' }, { n:2,  r:'h' }] },
  { cls: 'r-2',   items: [{ n:3,  r:'h' }, { n:4,  r:'h' }] },
  { cls: 'r-h2p', items: [{ n:6,  r:'h' }, { n:5,  r:'p' }] },
  { cls: 'r-2',   items: [{ n:7,  r:'h' }, { n:8,  r:'h' }] },
  { cls: 'r-p2h', items: [{ n:9,  r:'p' }, { n:10, r:'h' }] },
  { cls: 'r-2',   items: [{ n:11, r:'h' }, { n:12, r:'h' }] },
  { cls: 'r-2',   items: [{ n:13, r:'h' }, { n:14, r:'h' }] },
  { cls: 'r-1',   items: [{ n:15, r:'h' }] },
];

const LAYOUTS = { '2026': LAYOUT_2026, '2025': LAYOUT_2025, '2024': LAYOUT_2024 };

function buildMosaic(gridId, year) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  LAYOUTS[year].forEach(rowDef => {
    const row = document.createElement('div');
    row.className = 'row ' + rowDef.cls;
    rowDef.items.forEach(itemDef => {
      const num = String(itemDef.n).padStart(2, '0');
      const src = 'photos/' + year + '-' + num + '.jpg';
      const item = document.createElement('div');
      item.className = 'grid-item ' + itemDef.r;
      const img = document.createElement('img');
      img.src = src;
      img.onerror = function() {
        this.remove();
        if (!item.querySelector('.grid-placeholder')) {
          const ph = document.createElement('div');
          ph.className = 'grid-placeholder';
          ph.textContent = num;
          item.appendChild(ph);
        }
      };
      item.appendChild(img);
      const overlay = document.createElement('div');
      overlay.className = 'grid-overlay';
      const span = document.createElement('span');
      span.textContent = year + ' — ' + num;
      overlay.appendChild(span);
      item.appendChild(overlay);
      item.addEventListener('click', () => openLightbox(src, year + ' — ' + num));
      row.appendChild(item);
    });
    grid.appendChild(row);
  });
}

// Flat list of all photos across all years for navigation
let allPhotos = [];
let currentPhotoIndex = 0;

function buildPhotoList() {
  allPhotos = [];
  const years = ['2026', '2025', '2024'];
  const layouts = { '2026': LAYOUT_2026, '2025': LAYOUT_2025, '2024': LAYOUT_2024 };
  years.forEach(year => {
    layouts[year].forEach(rowDef => {
      rowDef.items.forEach(itemDef => {
        const num = String(itemDef.n).padStart(2, '0');
        allPhotos.push({ src: 'photos/' + year + '-' + num + '.jpg', label: year + ' — ' + num });
      });
    });
  });
}

function openLightbox(src, label) {
  currentPhotoIndex = allPhotos.findIndex(p => p.src === src);
  showLightboxPhoto(currentPhotoIndex);
  document.getElementById('lightbox').classList.add('open');
}

function showLightboxPhoto(index) {
  const photo = allPhotos[index];
  const content = document.getElementById('lightbox-content');
  const img = document.createElement('img');
  img.src = photo.src;
  img.onerror = () => { content.innerHTML = '<div class="lightbox-placeholder">— ' + photo.label + ' —</div>'; };
  content.innerHTML = '';
  content.appendChild(img);
}

function lightboxNav(dir) {
  currentPhotoIndex = (currentPhotoIndex + dir + allPhotos.length) % allPhotos.length;
  showLightboxPhoto(currentPhotoIndex);
}

function closeLightbox(e) {
  if (e && e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}

function showSection(name) {
  ['home','portfolio','contact'].forEach(s => document.getElementById('section-' + s).classList.remove('active'));
  ['portfolio','contact'].forEach(l => { const el = document.getElementById('link-' + l); if(el) el.classList.remove('active'); });
  document.getElementById('section-' + name).classList.add('active');
  const link = document.getElementById('link-' + name);
  if (link) link.classList.add('active');
}

buildMosaic('grid-2026', '2026');
buildMosaic('grid-2025', '2025');
buildMosaic('grid-2024', '2024');
buildPhotoList();
showSection('home');

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});
</script>
</body>
</html>
